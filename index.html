<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nosso Amor ❤️</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,#0f0f0f,#1b0015);
color:white;
text-align:center;
overflow-x:hidden;
}

h1{
margin-top:20px;
}

#intro{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#intro button{
background:#ff4d6d;
color:white;
padding:15px 30px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

#conteudo{
display:none;
}

#contador{
font-size:24px;
font-weight:bold;
margin:20px;
}

#mensagem{
max-width:500px;
margin:auto;
padding:20px;
line-height:1.6;
font-size:18px;
}

.fotoPrincipal{
width:90%;
max-width:400px;
border-radius:20px;
margin:20px auto;
display:block;
}

.galeria{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:20px;
max-width:500px;
margin:auto;
}

.galeria img{
width:100%;
border-radius:12px;
aspect-ratio:1/1;
object-fit:cover;
transition:transform 0.4s;
}

.galeria img:hover{
transform:scale(1.05);
}

button{
background:#ff4d6d;
color:white;
padding:12px 25px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
margin:20px;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

</style>
</head>

<body>

<canvas id="hearts"></canvas>

<div id="intro">

<h1>Tenho uma surpresa para você ❤️</h1>

<button onclick="abrir()">Clique para abrir</button>

</div>

<div id="conteudo">

<h1>Nosso Amor ❤️</h1>

<div id="contador"></div>

<img src="foto1.jpeg" class="fotoPrincipal">

<div id="mensagem"></div>

<div class="galeria">

<img src="foto1.jpeg">
<img src="foto2.jpeg">
<img src="foto3.jpeg">
<img src="foto4.jpeg">
<img src="foto5.jpeg">
<img src="foto6.jpeg">
<img src="foto7.jpeg">
<img src="foto8.jpeg">
<img src="foto9.jpeg">
<img src="foto10.jpeg">

</div>

<button onclick="toggleMusic()">Tocar / Pausar Música 🎵</button>

<audio id="musica" loop>
<source src="musica.mp3" type="audio/mp3">
</audio>

</div>

<script>

/* ABRIR SURPRESA */

function abrir(){

document.getElementById("intro").style.display="none"
document.getElementById("conteudo").style.display="block"

document.getElementById("musica").play()

digitar()

}

/* CONTADOR RELACIONAMENTO */

const startDate = new Date("2020-02-18")

function updateClock(){

const now = new Date()

let diff = now - startDate

let seconds = Math.floor(diff/1000)%60
let minutes = Math.floor(diff/1000/60)%60
let hours = Math.floor(diff/1000/60/60)%24
let daysTotal = Math.floor(diff/1000/60/60/24)

let years = Math.floor(daysTotal/365)
let months = Math.floor((daysTotal%365)/30)
let days = (daysTotal%365)%30

document.getElementById("contador").innerHTML =
years+" anos "+months+" meses "+days+" dias<br>"+
hours+" horas "+minutes+" minutos "+seconds+" segundos juntos ❤️"

}

setInterval(updateClock,1000)

/* MENSAGEM DIGITANDO */

const texto =
"Oi meu amor ❤️ Fiz essa lembrancinha simples mas com muito amor. Obrigado por aparecer na minha vida e por tudo que vivemos juntos. Eu te amo muito e nunca duvide disso."

let i = 0

function digitar(){

if(i < texto.length){

document.getElementById("mensagem").innerHTML += texto.charAt(i)

i++

setTimeout(digitar,40)

}

}

/* MUSICA */

function toggleMusic(){

const m = document.getElementById("musica")

if(m.paused){m.play()}
else{m.pause()}

}

/* CORAÇÕES */

const canvas = document.getElementById("hearts")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let hearts=[]

for(let i=0;i<35;i++){

hearts.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*20+10,
speed:Math.random()*0.7+0.3
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="rgba(255,80,120,0.7)"

hearts.forEach(h=>{

ctx.font=h.size+"px Arial"
ctx.fillText("❤",h.x,h.y)

h.y+=h.speed

if(h.y>canvas.height){
h.y=-10
h.x=Math.random()*canvas.width
}

})

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
